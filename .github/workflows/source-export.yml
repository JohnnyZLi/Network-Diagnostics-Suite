name: Apply staged implementation

on:
  push:
    branches: [assistant/source-export]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Apply implementation to validation branch
        run: |
          cp automation/path-isolation.patch /tmp/path-isolation.patch
          git fetch origin main
          git checkout -B assistant/path-isolation origin/main
          git apply --index /tmp/path-isolation.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Add path-isolated LAN throughput diagnostics"
          git push --force origin HEAD:assistant/path-isolation
