name: Apply staged implementation

on:
  push:
    branches: [assistant/source-export]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Reconstruct and verify implementation archive
        run: |
          cat \
            automation/archive/chunk-00 \
            automation/archive/chunk-01 \
            automation/archive/chunk-02a \
            automation/archive/chunk-02b \
            automation/archive/chunk-04 \
            automation/archive/chunk-06 \
            > /tmp/path-isolation-files.b64
          test "$(wc -c < /tmp/path-isolation-files.b64)" -eq 48704
          echo "356795f0a8caba50ff2e93b66f1e9621ffcb212b7d9eb781f8b80b5d7dee6aa7  /tmp/path-isolation-files.b64" | sha256sum -c -
          base64 --decode /tmp/path-isolation-files.b64 > /tmp/path-isolation-files.tar.gz
          echo "cf6e2fe343d4e8f1f3fe2938ca7c941c9c86831055e45b19858f8e55be2af783  /tmp/path-isolation-files.tar.gz" | sha256sum -c -
          tar -tzf /tmp/path-isolation-files.tar.gz
      - name: Reset validation branch and extract implementation
        run: |
          git fetch origin main
          git checkout -B assistant/path-isolation origin/main
          tar -xzf /tmp/path-isolation-files.tar.gz
      - name: Commit implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs src tests tools worker
          git commit -m "Add path-isolated LAN throughput diagnostics"
      - name: Push validation branch
        run: git push --force origin HEAD:assistant/path-isolation
